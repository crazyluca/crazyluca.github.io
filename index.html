<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Classroom 97</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        background: radial-gradient(circle at center, #0a0a0a, #000);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Arial, sans-serif;
    }

    .box {
        text-align: center;
        color: white;
    }

    input {
        width: 300px;
        padding: 12px;
        font-size: 16px;
        border: none;
        outline: none;
        border-radius: 6px;
        text-align: center;
    }

    h1 {
        margin-bottom: 20px;
        letter-spacing: 3px;
    }

    .hint {
        margin-top: 10px;
        font-size: 12px;
        color: #888;
    }
</style>
</head>

<body>

<div class="box">
    <h1>CLASSROOM 97</h1>
    <input id="entry" type="text" placeholder="Enter to continue..." />
    <div class="hint">Type anything to enter</div>
</div>

<script>
    const input = document.getElementById("entry");

    input.addEventListener("input", () => {
        if (input.value.trim().length > 0) {
            window.location.href = "https://classroom97.base44.app";
        }
    });
</script>

</body>
</html>
