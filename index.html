<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Classroom 97</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        background: radial-gradient(circle at center, #0a0a0a, #000000);
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    /* top subtle header */
    .topbar {
        position: absolute;
        top: 10px;
        width: 100%;
        text-align: center;
        color: #666;
        font-size: 12px;
        letter-spacing: 3px;
        text-transform: uppercase;
    }

    /* main blue panel */
    .panel {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 700px;
        height: 220px;
        background: #0077ff;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 60px rgba(0, 119, 255, 0.6);
        border-radius: 6px;
    }

    .panel h1 {
        font-size: 48px;
        letter-spacing: 6px;
        color: black;
        font-weight: 900;
    }

    .subtitle {
        position: absolute;
        bottom: 25px;
        color: rgba(0,0,0,0.7);
        font-size: 14px;
        letter-spacing: 2px;
    }

    /* Oracle AI box */
    .oracle {
        position: absolute;
        bottom: 20px;
        right: 20px;
        width: 180px;
        height: 120px;
        background: rgba(20,20,20,0.9);
        border: 1px solid #222;
        box-shadow: 0 0 20px rgba(0,0,0,0.7);
        padding: 10px;
        color: white;
        font-size: 12px;
    }

    .oracle-title {
        color: #00aaff;
        font-weight: bold;
        margin-bottom: 5px;
    }

    /* glitch vibe (optional) */
    .glow {
        text-shadow: 0 0 10px rgba(0,119,255,0.6);
    }
</style>
</head>

<body>

<div class="topbar">UNBLOCKED GAMES PORTAL</div>

<div class="panel">
    <div>
        <h1 class="glow">CLASSROOM 97</h1>
        <div class="subtitle">ENTER THE UNLOCKED GAMES</div>
    </div>
</div>

<div class="oracle">
    <div class="oracle-title">ORACLE AI</div>
    <div>System online...</div>
    <div>Waiting for input...</div>
</div>

</body>
</html>
